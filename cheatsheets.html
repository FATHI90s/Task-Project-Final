<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheatSheet Hub | الاختصارات</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">CheatSheet Hub</span>
            </div>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="cheatsheets.html" class="active">الاختصارات</a>
                <a href="detail.html">تفاصيل</a>
                <a href="contact.html">تواصل</a>
                <a href="about.html">من نحن</a>
                <a href="login.html" class="login-btn">تسجيل الدخول</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container" style="padding-top: 2rem;">
            <h2 class="section-title">📚 جميع الاختصارات البرمجية</h2>
            <p style="text-align:center; color:#4a5568; margin-bottom:1rem;">
                🔍 ابحث عن اختصارك المفضل أو صنفه حسب اللغة
            </p>

            <!-- أدوات البحث والفلترة -->
            <div class="search-filter">
                <input type="text" id="searchInput" placeholder="🔍 ابحث عن اختصار..." />
                <select id="filterSelect">
                    <option value="all">📌 جميع اللغات</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Python">Python</option>
                    <option value="Git">Git</option>
                    <option value="HTML/CSS">HTML & CSS</option>
                    <option value="VS Code">VS Code</option>
                </select>
            </div>

            <!-- شبكة البطاقات -->
            <div id="cheatsheetGrid" class="cheatsheet-grid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Fathi alshafie — بنك الاختصالات البرمجية</p>
            <p class="footer-small">🧠 أكثر من 130 اختصاراً حقيقياً</p>
        </div>
    </footer>

    <script src="script.js"></script>
