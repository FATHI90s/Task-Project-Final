    <meta charset="UTF-8" />

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">CheatSheet Hub</span>
            </div>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>

            </nav>
        </div>

    <main>
        <div class="login-container">
            <h2>🔐 تسجيل الدخول</h2>
            <p class="sub">قم بتسجيل الدخول للوصول إلى محتوى حصري</p>
            <form id="loginForm">
                <label for="loginEmail">البريد الإلكتروني</label>
                <input type="email" id="loginEmail" placeholder="user@example.com" required />

                <label for="loginPassword">كلمة المرور</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required />

                <button type="submit" class="btn-login">تسجيل الدخول</button>
                <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:#4a5568;">
                    👆 جرب: user@example.com / 123456
                </p>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
       <p>&copy; 2026 Fathi alshafie — بنك الاختصالات البرمجية</p>
     
        </div>
